<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Slack Notes</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Lato:wght@300;400;700&family=Courier+Prime:wght@400;700&display=swap');

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #f5f2eb;
  --card: #fdfaf4;
  --ink: #1a1a18;
  --ink-light: #6b6860;
  --ink-faint: #c8c4ba;
  --accent: #2d6a4f;
  --accent-light: rgba(45,106,79,0.08);
  --border: #ddd9cf;
  --radius: 12px;
  --shadow: 0 2px 16px rgba(0,0,0,0.07);
  --green: #1a7a4a;
  --green-light: rgba(26,122,74,0.09);
  --mic-active: #2d6a4f;
}

html, body {
  height: 100%; background: var(--bg); color: var(--ink);
  font-family: 'Lato', sans-serif; overscroll-behavior: none;
  -webkit-tap-highlight-color: transparent;
}
body { display: flex; flex-direction: column; min-height: 100dvh; }
.screen { display: none; flex-direction: column; flex: 1; }
.screen.active { display: flex; }

/* ─── SETUP ─── */
#setupScreen {
  padding-top: max(env(safe-area-inset-top), 20px);
  padding-bottom: max(env(safe-area-inset-bottom), 24px);
}
.setup-inner {
  flex: 1; display: flex; flex-direction: column;
  padding: 28px 24px 32px; gap: 24px; overflow-y: auto;
}
.wordmark {
  font-family: 'Courier Prime', monospace; font-size: 14px; font-weight: 700;
  letter-spacing: 0.08em; color: var(--accent); text-transform: uppercase;
  display: flex; align-items: center; gap: 8px;
}
.wordmark::before {
  content: ''; display: block; width: 8px; height: 8px;
  background: var(--accent); border-radius: 50%;
}
.setup-title { font-size: 26px; font-weight: 300; line-height: 1.3; }
.setup-title strong { font-weight: 700; }
.field { display: flex; flex-direction: column; gap: 8px; }
.field-label {
  font-family: 'Courier Prime', monospace; font-size: 11px;
  letter-spacing: 0.1em; text-transform: uppercase; color: var(--ink-light);
}
.field-input {
  background: var(--card); border: 1.5px solid var(--border);
  border-radius: var(--radius); padding: 15px 16px;
  font-family: 'Courier Prime', monospace; font-size: 14px; color: var(--ink);
  width: 100%; outline: none; transition: border-color 0.2s;
  -webkit-appearance: none; box-shadow: var(--shadow);
}
.field-input:focus { border-color: var(--accent); }
.field-input::placeholder { color: var(--ink-faint); }
.field-hint { font-size: 12px; color: var(--ink-light); line-height: 1.55; }
.field-hint a { color: var(--accent); text-decoration: none; }
.btn-primary {
  background: var(--accent); color: #fff; border: none;
  border-radius: var(--radius); padding: 17px;
  font-family: 'Lato', sans-serif; font-size: 16px; font-weight: 700;
  width: 100%; cursor: pointer; transition: opacity 0.15s, transform 0.1s; margin-top: auto;
}
.btn-primary:active { opacity: 0.82; transform: scale(0.98); }
.btn-secondary {
  background: none; border: 1.5px solid var(--border); border-radius: var(--radius);
  padding: 17px; font-family: 'Lato', sans-serif; font-size: 15px;
  color: var(--ink-light); width: 100%; cursor: pointer;
}
.btn-secondary:active { opacity: 0.7; }

/* ─── Theme swatches ─── */
.theme-swatches {
  display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 10px;
}
.theme-swatch {
  width: 36px; height: 36px; border-radius: 50%;
  border: 3px solid transparent; cursor: pointer;
  transition: transform 0.15s, border-color 0.15s;
  -webkit-tap-highlight-color: transparent;
  flex-shrink: 0;
}
.theme-swatch:active { transform: scale(0.9); }
.theme-swatch.active { border-color: var(--ink); transform: scale(1.1); }
.theme-custom-row {
  display: flex; align-items: center; gap: 12px; margin-top: 4px;
}
.theme-custom-label {
  font-family: 'Courier Prime', monospace; font-size: 11px;
  letter-spacing: 0.08em; text-transform: uppercase; color: var(--ink-light);
}
input[type="color"] {
  width: 44px; height: 36px; border-radius: 8px;
  border: 1.5px solid var(--border); padding: 2px;
  cursor: pointer; background: var(--card);
  -webkit-appearance: none;
}

/* ─── MAIN ─── */
#mainScreen {
  padding-top: max(env(safe-area-inset-top), 0px);
  padding-bottom: max(env(safe-area-inset-bottom), 0px);
}
.topbar {
  display: flex; align-items: stretch;
  border-bottom: 1.5px solid var(--border);
  background: var(--card); flex-direction: column;
}
.channel-pill {
  display: flex; align-items: center; gap: 6px;
  background: var(--accent-light); border: 1px solid rgba(45,106,79,0.2);
  border-radius: 999px; padding: 7px 14px; flex: 1; min-width: 0;
}
.channel-hash { color: var(--accent); font-weight: 700; font-size: 15px; flex-shrink: 0; }
.channel-name {
  font-family: 'Courier Prime', monospace; font-size: 13px; font-weight: 700;
  color: var(--accent); overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}
.topbar-btn {
  background: none; border: 1.5px solid var(--border); border-radius: 10px;
  width: 38px; height: 38px; display: flex; align-items: center; justify-content: center;
  cursor: pointer; font-size: 17px; color: var(--ink-light); flex-shrink: 0; transition: all 0.15s;
}
.topbar-btn:active { border-color: var(--accent); color: var(--accent); }

.main-scroll {
  flex: 1; overflow-y: auto; padding: 16px 20px;
  display: flex; flex-direction: column; gap: 14px;
}
.section-label {
  font-family: 'Courier Prime', monospace; font-size: 10px;
  letter-spacing: 0.12em; text-transform: uppercase;
  color: var(--ink-faint); margin-bottom: -6px;
}

/* meeting */
.meeting-row { display: flex; align-items: center; gap: 10px; }
.meeting-toggle { display: flex; align-items: center; gap: 8px; cursor: pointer; flex-shrink: 0; }
.meeting-toggle input[type="checkbox"] {
  width: 20px; height: 20px; accent-color: var(--accent); cursor: pointer; flex-shrink: 0;
}
.meeting-select-wrap { position: relative; flex: 1; }
.meeting-select-wrap.disabled { opacity: 0.4; pointer-events: none; }
.meeting-select {
  width: 100%; background: var(--card); border: 1.5px solid var(--border);
  border-radius: var(--radius); padding: 14px 44px 14px 16px;
  font-family: 'Lato', sans-serif; font-size: 15px; font-weight: 700; color: var(--ink);
  appearance: none; -webkit-appearance: none; outline: none;
  box-shadow: var(--shadow); cursor: pointer; transition: border-color 0.2s; line-height: 1.4;
}
.meeting-select:focus { border-color: var(--accent); }
.meeting-select option { font-weight: 400; }
.meeting-select-arrow {
  position: absolute; right: 14px; top: 50%; transform: translateY(-50%);
  pointer-events: none; color: var(--ink-light); font-size: 12px;
}
.meeting-select.has-value { border-color: var(--green); color: var(--green); }
.meeting-select.has-value + .meeting-select-arrow { color: var(--green); }
.meeting-select.no-meetings { color: var(--ink-faint); font-weight: 400; font-style: italic; }



/* textarea */
.note-textarea {
  width: 100%; min-height: 150px; max-height: 220px;
  background: var(--card); border: 1.5px solid var(--border);
  border-radius: var(--radius); outline: none; resize: none;
  box-shadow: var(--shadow); transition: border-color 0.2s;
  padding: 14px 50px 14px 16px;
  font-family: 'Courier Prime', monospace; font-size: 15px;
  line-height: 1.65; color: var(--ink);
  -webkit-appearance: none;
}
.note-textarea:focus { border-color: var(--accent); }
.note-textarea::placeholder { color: var(--ink-faint); }
.note-textarea.listening { border-color: var(--mic-active); box-shadow: 0 0 0 3px rgba(45,106,79,0.12); }

/* mic button inside editor */
.note-wrap { position: relative; }
.mic-btn {
  position: absolute; top: 50px; right: 10px;
  width: 34px; height: 34px; border-radius: 50%;
  border: 1.5px solid var(--border); background: var(--card);
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; font-size: 16px; transition: all 0.2s;
  box-shadow: var(--shadow); z-index: 10;
}
.mic-btn:active { transform: scale(0.92); }
.mic-btn.listening {
  background: var(--mic-active); border-color: var(--mic-active);
  animation: pulse 1.2s ease-in-out infinite;
}
@keyframes pulse {
  0%, 100% { box-shadow: 0 0 0 0 rgba(45,106,79,0.4); }
  50%       { box-shadow: 0 0 0 8px rgba(45,106,79,0); }
}

/* draft indicator */
.draft-indicator {
  font-family: 'Courier Prime', monospace; font-size: 10px;
  letter-spacing: 0.08em; color: var(--ink-faint);
  text-align: right; margin-top: -8px; transition: color 0.3s;
}
.draft-indicator.saved { color: var(--green); }

/* transcript preview */
.transcript-preview {
  background: rgba(45,106,79,0.06); border: 1px dashed rgba(45,106,79,0.3);
  border-radius: 10px; padding: 10px 14px; font-size: 14px;
  color: var(--ink-light); font-style: italic; line-height: 1.5; display: none;
}
.transcript-preview.active { display: block; }

/* action types */
.action-types { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
/* no last-child centering needed */
.action-type {
  display: flex; flex-direction: column; align-items: center; gap: 5px;
  background: var(--card); border: 1.5px solid var(--border);
  border-radius: var(--radius); padding: 12px 6px;
  cursor: pointer; transition: all 0.15s; box-shadow: var(--shadow);
  -webkit-tap-highlight-color: transparent;
}
.action-type:active { transform: scale(0.94); }
.action-type.selected {
  border-color: var(--accent); background: var(--accent-light);
  box-shadow: 0 0 0 3px rgba(45,106,79,0.1);
}
.action-emoji { font-size: 24px; line-height: 1; }
.action-label {
  font-family: 'Courier Prime', monospace; font-size: 10px;
  letter-spacing: 0.04em; text-transform: uppercase;
  color: var(--ink-light); text-align: center;
}
.action-type.selected .action-label { color: var(--accent); font-weight: 700; }

/* send bar */
.send-bar {
  display: flex; gap: 10px;
  padding: 14px 20px calc(env(safe-area-inset-bottom, 0px) + 16px);
  border-top: 1.5px solid var(--border); background: var(--card);
}
.btn-send {
  flex: 1; background: var(--accent); color: #fff; border: none;
  border-radius: var(--radius); height: 54px;
  font-family: 'Lato', sans-serif; font-size: 16px; font-weight: 700;
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  gap: 8px; transition: opacity 0.15s, transform 0.1s;
}
.btn-send:active { opacity: 0.82; transform: scale(0.98); }
.btn-send:disabled { opacity: 0.35; }
.spinner {
  width: 18px; height: 18px;
  border: 2px solid rgba(255,255,255,0.3); border-top-color: #fff;
  border-radius: 50%; animation: spin 0.7s linear infinite; display: none;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* toast */
#toast {
  position: fixed;
  bottom: calc(env(safe-area-inset-bottom, 0px) + 80px);
  left: 50%; transform: translateX(-50%) translateY(14px);
  background: var(--ink); color: #fff; border-radius: 999px;
  padding: 12px 22px; font-size: 14px; font-weight: 500;
  white-space: nowrap; opacity: 0; transition: opacity 0.22s, transform 0.22s;
  pointer-events: none; z-index: 200; box-shadow: 0 4px 20px rgba(0,0,0,0.25);
}
#toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
#toast.success { background: var(--green); }
#toast.error { background: #c0392b; }

/* ─── Header tabs ─── */
.topbar {
  flex-direction: column;
  padding: 0;
  gap: 0;
}
.tab-header {
  display: flex; width: 100%;
  border-bottom: 1.5px solid var(--border);
}
.tab-hdr-btn {
  flex: 1; padding: 13px 0; background: none; border: none;
  font-family: 'Lato', sans-serif; font-size: 14px; font-weight: 700;
  color: var(--ink-faint); cursor: pointer; position: relative;
  transition: color 0.15s; letter-spacing: 0.02em;
  -webkit-tap-highlight-color: transparent;
}
.tab-hdr-btn.active { color: var(--accent); }
.tab-hdr-btn.active::after {
  content: ''; position: absolute; bottom: -1.5px; left: 20%; right: 20%;
  height: 2.5px; background: var(--accent); border-radius: 2px;
}
.tab-badge {
  display: inline-flex; align-items: center; justify-content: center;
  background: var(--accent); color: #fff;
  font-family: 'Lato', sans-serif; font-size: 10px; font-weight: 700;
  border-radius: 999px; min-width: 16px; height: 16px;
  padding: 0 4px; margin-left: 5px; vertical-align: middle;
  opacity: 0; transition: opacity 0.2s;
}
.tab-badge.visible { opacity: 1; }
.topbar-actions {
  display: flex; align-items: center; gap: 10px;
  padding: 10px 20px;
}
.topbar-actions .channel-pill { flex: 1; }
.todo-header-count {
  font-family: 'Courier Prime', monospace; font-size: 11px;
  color: var(--ink-faint); letter-spacing: 0.06em; flex: 1;
}

/* ─── Todo screen ─── */
.todo-scroll {
  flex: 1; overflow-y: auto;
  padding: 16px 20px 32px;
  display: flex; flex-direction: column; gap: 20px;
}
.todo-empty {
  flex: 1; display: flex; flex-direction: column;
  align-items: center; justify-content: center; gap: 12px;
  color: var(--ink-faint); padding-bottom: 80px;
}
.todo-empty-icon { font-size: 44px; }
.todo-empty-text {
  font-family: 'Courier Prime', monospace; font-size: 13px;
  letter-spacing: 0.04em; text-align: center; line-height: 1.7;
}

/* Category section */
.todo-category {
  display: flex; flex-direction: column; gap: 0;
  border-radius: var(--radius); overflow: hidden;
  box-shadow: var(--shadow);
}
.todo-cat-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 10px 16px;
  font-family: 'Courier Prime', monospace; font-size: 11px;
  font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase;
}
.todo-cat-header .cat-count {
  font-size: 10px; opacity: 0.7; font-weight: 400;
}

/* Category colour tokens */
/* category colours applied via inline CSS vars */

.todo-cat-header { background: var(--cat-hd); color: #fff; }

/* Task row */
.todo-row {
  display: flex; align-items: flex-start; gap: 12px;
  padding: 13px 16px;
  background: var(--cat-bg);
  border-bottom: 1px solid rgba(0,0,0,0.05);
  cursor: pointer; transition: opacity 0.25s, transform 0.25s;
  -webkit-tap-highlight-color: transparent;
}
.todo-row:last-child { border-bottom: none; }
.todo-row.alt { background: var(--cat-stripe); }
.todo-row:active { opacity: 0.7; }

/* Check circle */
.todo-row-check {
  width: 22px; height: 22px; border-radius: 50%;
  border: 2px solid var(--cat-hd); flex-shrink: 0; margin-top: 1px;
  display: flex; align-items: center; justify-content: center;
  transition: background 0.2s;
}
.todo-row:active .todo-row-check { background: var(--cat-hd); }

/* Task body */
.todo-row-body { flex: 1; min-width: 0; }
.todo-row-text { font-size: 15px; line-height: 1.5; color: var(--ink); word-break: break-word; }
.todo-row-meta {
  display: flex; gap: 10px; margin-top: 5px; flex-wrap: wrap; align-items: center;
}
.todo-row-meeting {
  font-family: 'Courier Prime', monospace; font-size: 10px;
  color: var(--ink-light); letter-spacing: 0.03em;
}
.todo-row-date {
  font-family: 'Courier Prime', monospace; font-size: 10px;
  background: rgba(0,0,0,0.08); border-radius: 4px;
  padding: 1px 6px; color: var(--ink-light);
}
.todo-row-date.overdue { background: rgba(192,57,43,0.15); color: #c0392b; }

/* Move menu */
.todo-row-actions {
  display: flex; flex-direction: column; gap: 4px; flex-shrink: 0;
}
.todo-move-btn {
  background: rgba(0,0,0,0.08); border: none; border-radius: 6px;
  padding: 3px 7px; font-size: 10px; font-family: 'Courier Prime', monospace;
  color: var(--ink-light); cursor: pointer; letter-spacing: 0.03em;
  -webkit-tap-highlight-color: transparent;
}
.todo-move-btn:active { background: var(--cat-hd); color: #fff; }

/* Completing animation */
.todo-row.completing { opacity: 0; transform: translateX(48px); }
</style>
</head>
<body>

<!-- SETUP SCREEN -->
<div id="setupScreen" class="screen">
  <div class="setup-inner">
    <div class="wordmark">Slack Notes</div>
    <div class="setup-title" id="setupTitle">Quick notes,<br><strong>straight to Slack.</strong></div>
    <div class="field">
      <div class="field-label">Slack Webhook URL</div>
      <input class="field-input" type="url" id="webhookInput"
        placeholder="https://hooks.slack.com/services/..."
        autocomplete="off" autocorrect="off" spellcheck="false">
      <p class="field-hint">
        <a href="https://api.slack.com/apps" target="_blank">api.slack.com/apps</a>
        → Your App → Incoming Webhooks → Add New Webhook
      </p>
    </div>
    <div class="field">
      <div class="field-label">Channel name</div>
      <input class="field-input" type="text" id="channelInput"
        placeholder="#general" autocomplete="off" autocorrect="off">
    </div>
    <div class="field">
      <div class="field-label">Theme colour</div>
      <div class="theme-swatches" id="themeSwatches"></div>
      <div class="theme-custom-row">
        <span class="theme-custom-label">Custom</span>
        <input type="color" id="customColorPicker" value="#2d6a4f" oninput="onCustomColor(this.value)">
      </div>
    </div>
    <button class="btn-primary" onclick="saveSetup()">Save & Open →</button>
    <button class="btn-secondary" id="backBtn" onclick="goBack()" style="display:none">← Back</button>
  </div>
</div>

<!-- MAIN SCREEN -->
<div id="mainScreen" class="screen">

  <div class="topbar">
    <div class="tab-header">
      <button class="tab-hdr-btn active" id="tabNotes" onclick="switchTab('notes')">📝 Notes</button>
      <button class="tab-hdr-btn" id="tabTodo" onclick="switchTab('todo')">
        ✅ To Do<span class="tab-badge" id="todoBadge"></span>
      </button>
    </div>
    <div class="topbar-actions">
      <div class="channel-pill">
        <span class="channel-hash">#</span>
        <span class="channel-name" id="channelDisplay">channel</span>
      </div>
      <button class="topbar-btn" onclick="pasteMeetings()" title="Paste meetings">📋</button>
      <button class="topbar-btn" onclick="openSettings()" title="Settings">⚙</button>
    </div>
  </div>

  <div class="main-scroll">

    <!-- Meeting -->
    <div class="section-label">Meeting</div>
    <div class="meeting-row">
      <label class="meeting-toggle" for="meetingCheck">
        <input type="checkbox" id="meetingCheck" checked onchange="onMeetingToggle()">
      </label>
      <div class="meeting-select-wrap" id="meetingSelectWrap">
        <select class="meeting-select no-meetings" id="meetingSelect" onchange="onMeetingChange()">
          <option value="">No meetings — tap 📋 to paste</option>
        </select>
        <span class="meeting-select-arrow">▼</span>
      </div>
    </div>

    <!-- Note -->
    <div class="section-label">Note</div>
    <div class="note-wrap">
      <textarea id="noteText" class="note-textarea"
        placeholder="Write or tap 🎙 to speak…"
        maxlength="3000"
        oninput="onNoteInput()"></textarea>
      <button class="mic-btn" id="micBtn" onclick="toggleSpeech()" title="Speak">🎙</button>
    </div>

    <div class="draft-indicator" id="draftIndicator">—</div>
    <div class="transcript-preview" id="transcriptPreview"></div>

    <!-- Types -->
    <div class="section-label">Type</div>
    <div class="action-types" id="actionTypes"></div>

  </div>

  <div class="send-bar">
    <button class="btn-send" id="sendBtn" onclick="sendNote()">
      <span id="sendLabel">Send to Slack</span>
      <div class="spinner" id="spinner"></div>
    </button>
  </div>

</div>

<!-- TODO SCREEN -->
<div id="todoScreen" class="screen">

  <div class="topbar">
    <div class="tab-header">
      <button class="tab-hdr-btn" id="tabNotes2" onclick="switchTab('notes')">📝 Notes</button>
      <button class="tab-hdr-btn active" id="tabTodo2" onclick="switchTab('todo')">
        ✅ To Do<span class="tab-badge" id="todoBadge2"></span>
      </button>
    </div>
    <div class="topbar-actions">
      <span class="todo-header-count" id="todoCount"></span>
      <button class="topbar-btn" onclick="openSettings()" title="Settings">⚙</button>
    </div>
  </div>

  <div class="todo-scroll" id="todoScroll">
    <div class="todo-empty" id="todoEmpty">
      <div class="todo-empty-icon">🎉</div>
      <div class="todo-empty-text">Nothing to do!<br>Send a note tagged ✅ My ToDo<br>and it will appear here.</div>
    </div>
  </div>

</div>

<div id="toast"></div>

<script>
const ACTION_TYPES = [
  { emoji: '📝', label: 'Notes',    tag: '📝 Notes'    },
  { emoji: '✅', label: 'My ToDo',  tag: '✅ My ToDo'  },
  { emoji: '💡', label: 'Ideas',    tag: '💡 Ideas'    },
  { emoji: '👔', label: 'Manager',  tag: '👔 Manager'  },
  { emoji: '🔄', label: 'Delegate', tag: '🔄 Delegate' },
  { emoji: '👥', label: 'Group',    tag: '👥 Group'    },
];

const STORAGE_KEY = 'slacknotes_v4';
const DRAFT_KEY   = 'slacknotes_draft';
let selectedTypes = new Set();
let meetings = [];
let autoSaveTimer = null;

// ── Storage ───────────────────────────────────────
// ── Theme ────────────────────────────────────────
const THEMES = [
  { name: 'Forest Green',  color: '#2d6a4f' },
  { name: 'Ocean Blue',    color: '#1a56db' },
  { name: 'Slate Purple',  color: '#6c3fc9' },
  { name: 'Crimson',       color: '#c0392b' },
  { name: 'Burnt Orange',  color: '#d4620a' },
  { name: 'Teal',          color: '#0d7377' },
  { name: 'Rose',          color: '#c2185b' },
  { name: 'Charcoal',      color: '#374151' },
];

function applyTheme(hex) {
  const r = parseInt(hex.slice(1,3),16);
  const g = parseInt(hex.slice(3,5),16);
  const b = parseInt(hex.slice(5,7),16);
  document.documentElement.style.setProperty('--accent', hex);
  document.documentElement.style.setProperty('--accent-light', `rgba(${r},${g},${b},0.08)`);
  document.documentElement.style.setProperty('--mic-active', hex);
}

function renderSwatches(selectedColor) {
  const container = document.getElementById('themeSwatches');
  if (!container) return;
  container.innerHTML = '';
  THEMES.forEach(t => {
    const sw = document.createElement('div');
    sw.className = 'theme-swatch' + (t.color === selectedColor ? ' active' : '');
    sw.style.background = t.color;
    sw.title = t.name;
    sw.onclick = () => {
      document.querySelectorAll('.theme-swatch').forEach(s => s.classList.remove('active'));
      sw.classList.add('active');
      document.getElementById('customColorPicker').value = t.color;
      applyTheme(t.color);
      saveCfg({ theme: t.color });
    };
    container.appendChild(sw);
  });
  const picker = document.getElementById('customColorPicker');
  if (picker) picker.value = selectedColor || '#2d6a4f';
}

function onCustomColor(hex) {
  document.querySelectorAll('.theme-swatch').forEach(s => s.classList.remove('active'));
  applyTheme(hex);
  saveCfg({ theme: hex });
}

function loadCfg() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || {}; } catch { return {}; }
}
function saveCfg(updates) {
  const cfg = loadCfg();
  localStorage.setItem(STORAGE_KEY, JSON.stringify({ ...cfg, ...updates }));
}

// ── Boot ─────────────────────────────────────────
function init() {
  // Default: select Delegate (index 4) BEFORE rendering so it renders highlighted
  selectedTypes.add(4);
  renderActionTypes();
  initSpeech();
  const cfg = loadCfg();
  // Apply saved theme
  applyTheme(cfg.theme || '#2d6a4f');
  loadTodos();
  updateTodoBadge();
  if (cfg.webhook && cfg.channel) {
    showMain(cfg);
  } else {
    showScreen('setupScreen');
    renderSwatches(cfg.theme || '#2d6a4f');
  }
  // Restore draft
  const draft = localStorage.getItem(DRAFT_KEY);
  if (draft) {
    document.getElementById('noteText').value = draft;
    showDraftIndicator('Draft restored', false);
  }
  if (cfg.meetings && Array.isArray(cfg.meetings) && cfg.meetings.length > 0) {
    meetings = cfg.meetings;
    populateMeetingSelect(meetings, true);
  }
}

// ── Screens ───────────────────────────────────────
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}
function showMain(cfg) {
  document.getElementById('channelDisplay').textContent = cfg.channel.replace(/^#/, '');
  showScreen('mainScreen');
}
function openSettings() {
  const cfg = loadCfg();
  document.getElementById('webhookInput').value = cfg.webhook || '';
  document.getElementById('channelInput').value = cfg.channel ? '#' + cfg.channel.replace(/^#/, '') : '';
  document.getElementById('setupTitle').innerHTML = 'Update your<br><strong>settings.</strong>';
  document.getElementById('backBtn').style.display = 'block';
  showScreen('setupScreen');
  const currentTheme = loadCfg().theme || '#2d6a4f';
  renderSwatches(currentTheme);
}
function goBack() {
  const cfg = loadCfg(); if (cfg.webhook && cfg.channel) showMain(cfg);
}
function saveSetup() {
  const webhook = document.getElementById('webhookInput').value.trim();
  const channel = document.getElementById('channelInput').value.trim().replace(/^#/, '');
  if (!webhook.startsWith('https://hooks.slack.com/')) { toast('Enter a valid Slack webhook URL', 'error'); return; }
  if (!channel) { toast('Enter a channel name', 'error'); return; }
  saveCfg({ webhook, channel });
  showMain({ webhook, channel });
  toast('Settings saved ✓', 'success');
}





// ── Auto-save draft ───────────────────────────────
function onNoteInput() {
  clearTimeout(autoSaveTimer);
  showDraftIndicator('Saving…', false);
  autoSaveTimer = setTimeout(() => {
    localStorage.setItem(DRAFT_KEY, document.getElementById('noteText').value);
    showDraftIndicator('Draft saved', true);
  }, 800);
}

function showDraftIndicator(msg, saved) {
  const el = document.getElementById('draftIndicator');
  el.textContent = msg;
  el.classList.toggle('saved', saved);
}

// ── Paste meetings ────────────────────────────────
async function pasteMeetings() {
  let text = '';
  try { text = await navigator.clipboard.readText(); }
  catch { toast('Clipboard access denied — allow it and try again', 'error'); return; }
  if (!text || !text.trim()) { toast('Clipboard is empty — run the Shortcut first', 'error'); return; }

  let obj;
  try { obj = JSON.parse(text.trim()); }
  catch { toast('Invalid JSON — check format', 'error'); return; }

  if (!obj || typeof obj !== 'object' || Array.isArray(obj)) {
    toast('Expected a JSON object { meetings, todos }', 'error'); return;
  }

  let meetingsLoaded = 0, todosLoaded = 0;

  // meetings key
  if (Array.isArray(obj.meetings) && obj.meetings.length > 0) {
    meetings = obj.meetings;
    saveCfg({ meetings });
    populateMeetingSelect(meetings, true);
    meetingsLoaded = meetings.length;
  }

  // todos key
  if (obj.todos && typeof obj.todos === 'object' && !Array.isArray(obj.todos)) {
    todos = [];
    let added = 0;
    Object.keys(obj.todos).forEach(function(cat) {
      if (Array.isArray(obj.todos[cat])) {
        obj.todos[cat].forEach(function(taskText) {
          if (typeof taskText === 'string' && taskText.trim()) {
            todos.push({ id: Date.now() * 1000 + added, text: taskText.trim(), meeting: '', cat: cat.toLowerCase(), date: '' });
            added++;
          }
        });
      }
    });
    saveTodos();
    todosLoaded = added;
  }

  if (meetingsLoaded === 0 && todosLoaded === 0) {
    toast('Nothing loaded — check meetings and todos keys', 'error'); return;
  }
  const parts = [];
  if (meetingsLoaded) parts.push(meetingsLoaded + ' meetings');
  if (todosLoaded) parts.push(todosLoaded + ' tasks');
  toast(parts.join(' & ') + ' loaded ✓', 'success');
}

// ── Meeting select ────────────────────────────────
let meetingAutoTimer = null;

function populateMeetingSelect(data, autoSelect) {
  const sel = document.getElementById('meetingSelect');
  sel.innerHTML = '';
  sel.classList.remove('no-meetings', 'has-value');
  const blank = document.createElement('option');
  blank.value = ''; blank.textContent = '— No meeting —';
  sel.appendChild(blank);
  data.forEach((m, i) => {
    const opt = document.createElement('option');
    opt.value = i;
    opt.textContent = m.time ? m.time + '  ·  ' + m.title : m.title;
    sel.appendChild(opt);
  });
  if (autoSelect && data.length > 0) {
    sel.value = smartSelectIndex(data);
    sel.classList.add('has-value');
  }
  // Start auto-update interval (every 60s)
  if (meetingAutoTimer) clearInterval(meetingAutoTimer);
  if (data.length > 0) {
    meetingAutoTimer = setInterval(() => autoUpdateMeeting(data), 300000); // every 5 min
  }
}

function autoUpdateMeeting(data) {
  const sel = document.getElementById('meetingSelect');
  // Don't override if user has manually picked "No meeting"
  if (!document.getElementById('meetingCheck').checked) return;
  const best = String(smartSelectIndex(data));
  if (sel.value !== best) {
    sel.value = best;
    sel.classList.toggle('has-value', best !== '');
    // Brief flash to signal the update
    sel.style.transition = 'opacity 0.3s';
    sel.style.opacity = '0.4';
    setTimeout(() => sel.style.opacity = '1', 300);
  }
}
function smartSelectIndex(data) {
  const now = new Date();
  const nowMins = now.getHours() * 60 + now.getMinutes();
  let best = 0;
  data.forEach((m, j) => { if (parseTimeMins(m.time) <= nowMins) best = j; });
  return best;
}
function parseTimeMins(timeStr) {
  if (!timeStr) return 0;
  const match = timeStr.match(/(\d+):(\d+)\s*(AM|PM)?/i);
  if (!match) return 0;
  let h = parseInt(match[1]), m = parseInt(match[2]);
  const p = (match[3] || '').toUpperCase();
  if (p === 'PM' && h !== 12) h += 12;
  if (p === 'AM' && h === 12) h = 0;
  return h * 60 + m;
}
function onMeetingChange() {
  document.getElementById('meetingSelect').classList.toggle('has-value',
    document.getElementById('meetingSelect').value !== '');
}
function onMeetingToggle() {
  const checked = document.getElementById('meetingCheck').checked;
  document.getElementById('meetingSelectWrap').classList.toggle('disabled', !checked);
}

// ── Action types ──────────────────────────────────
function renderActionTypes() {
  const container = document.getElementById('actionTypes');
  container.innerHTML = '';
  ACTION_TYPES.forEach((t, i) => {
    const el = document.createElement('div');
    el.className = 'action-type' + (selectedTypes.has(i) ? ' selected' : '');
    el.id = 'action-' + i;
    el.innerHTML = `<span class="action-emoji">${t.emoji}</span><span class="action-label">${t.label}</span>`;
    el.onclick = () => toggleType(i);
    container.appendChild(el);
  });
}
function toggleType(i) {
  if (selectedTypes.has(i)) {
    selectedTypes.delete(i);
    document.getElementById('action-' + i).classList.remove('selected');
  } else {
    selectedTypes.add(i);
    document.getElementById('action-' + i).classList.add('selected');
  }
}

// ── Speech ────────────────────────────────────────
let recognition = null;
let isListening = false;

function initSpeech() {
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) { document.getElementById('micBtn').style.display = 'none'; return; }
  recognition = new SR();
  recognition.continuous = true; recognition.interimResults = true; recognition.lang = 'en-US';
  recognition.onresult = (e) => {
    let interim = '', final = '';
    for (let i = e.resultIndex; i < e.results.length; i++) {
      const t = e.results[i][0].transcript;
      e.results[i].isFinal ? (final += t) : (interim += t);
    }
    document.getElementById('transcriptPreview').textContent = interim;
    if (final) {
      const ta = document.getElementById('noteText');
      const existing = ta.value.trim();
      ta.value = existing ? existing + ' ' + final.trim() : final.trim();
      onNoteInput();
    }
  };
  recognition.onerror = (e) => {
    if (e.error === 'not-allowed') toast('Microphone access denied', 'error');
    else if (e.error !== 'no-speech') toast('Speech error — try again', 'error');
    stopListening();
  };
  recognition.onend = () => {
    if (isListening) { try { recognition.start(); } catch(e) { stopListening(); } }
  };
}
function toggleSpeech() { isListening ? stopListening() : startListening(); }
function startListening() {
  if (!recognition) { toast('Speech not supported on this browser', 'error'); return; }
  try {
    recognition.start(); isListening = true;
    document.getElementById('micBtn').classList.add('listening');
    document.getElementById('micBtn').textContent = '⏹';
    document.getElementById('transcriptPreview').classList.add('active');
    document.getElementById('transcriptPreview').textContent = 'Listening…';
  } catch(e) { toast('Could not start microphone', 'error'); }
}
function stopListening() {
  isListening = false;
  if (recognition) { try { recognition.stop(); } catch(e) {} }
  document.getElementById('micBtn').classList.remove('listening');
  document.getElementById('micBtn').textContent = '🎙';
  document.getElementById('transcriptPreview').classList.remove('active');
  document.getElementById('transcriptPreview').textContent = '';
}

// Stop mic if page loses visibility (iPhone disconnects, screen locks, tab switches)
document.addEventListener('visibilitychange', () => {
  if (document.hidden && isListening) stopListening();
});

// Stop mic if window loses focus (Mac: Continuity mic drops when iPhone disconnects)
window.addEventListener('blur', () => {
  if (isListening) stopListening();
});

// ── Send ──────────────────────────────────────────────────────────
async function sendNote() {
  if (isListening) stopListening();
  const cfg = loadCfg();
  const text = document.getElementById('noteText').value.trim();
  const sel = document.getElementById('meetingSelect');
  if (selectedTypes.size === 0) { toast('Pick at least one type', 'error'); return; }
  if (!text) { toast('Write your note first', 'error'); return; }

  const typeLine = Array.from(selectedTypes).sort().map(i => ACTION_TYPES[i].tag).join(' · ');
  let lines = [];
  const includeMeeting = document.getElementById('meetingCheck').checked;
  if (includeMeeting && sel.value !== '') {
    const m = meetings[parseInt(sel.value)];
    if (m) lines.push('🗓️ Meeting: ' + m.title + (m.time ? ' · ' + m.time : ''));
  }
  lines.push(typeLine);
  lines.push(text);
  const message = lines.join('\n');

  const btn = document.getElementById('sendBtn');
  const label = document.getElementById('sendLabel');
  const spinner = document.getElementById('spinner');
  btn.disabled = true; label.style.display = 'none'; spinner.style.display = 'block';

  try {
    const res = await fetch(cfg.webhook, { method: 'POST', body: JSON.stringify({ message }) });
    if (res.ok) {
      toast('Sent to #' + cfg.channel.replace(/^#/, '') + ' ✓', 'success');
      // Auto-add to todo list if My ToDo type was selected (index 6)
      if (selectedTypes.has(1)) {
        const meetingEl = document.getElementById('meetingSelect');
        const meetingCtx = (document.getElementById('meetingCheck').checked && meetingEl.value !== '')
          ? (meetings[parseInt(meetingEl.value)] ? meetings[parseInt(meetingEl.value)].title : '') : '';
        // Split note into individual tasks, one per line, ignore blank lines
        text.split('\n').forEach(function(line) {
          const task = line.trim();
          if (task) addTodo(task, meetingCtx);
        });
      }
      document.getElementById('noteText').value = '';
      localStorage.removeItem(DRAFT_KEY);
      showDraftIndicator('—', false);
      selectedTypes.clear();
      document.querySelectorAll('.action-type').forEach(el => el.classList.remove('selected'));
    } else { throw new Error(res.status); }
  } catch { toast('Send failed — check webhook', 'error'); }
  finally { btn.disabled = false; label.style.display = 'inline'; spinner.style.display = 'none'; }
}

function clearAll() {
  if (isListening) stopListening();
  document.getElementById('noteText').value = '';
  localStorage.removeItem(DRAFT_KEY);
  showDraftIndicator('—', false);
  selectedTypes.clear();
  document.querySelectorAll('.action-type').forEach(el => el.classList.remove('selected'));
  const sel = document.getElementById('meetingSelect');
  sel.value = ''; sel.classList.remove('has-value');
}

// ── Toast ─────────────────────────────────────────
let toastTimer;
function toast(msg, type) {
  const el = document.getElementById('toast');
  el.textContent = msg; el.className = 'show ' + (type || '');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.className = '', 2800);
}

// ── Todo ───────────────────────────────────────────────
const TODO_KEY = 'slacknotes_todos';
// Fixed colours for the 4 core categories
const CORE_CATS = {
  'do':       { label: '🎯 Do',       hd: '#2d6a4f', bg: '#e8f5f0', stripe: '#ddf0e8' },
  'delegate': { label: '🤝 Delegate',  hd: '#1a56db', bg: '#e8f0fb', stripe: '#dde8f8' },
  'decide':   { label: '🤔 Decide',    hd: '#d4620a', bg: '#fdf3e3', stripe: '#faecd6' },
  'delete':   { label: '🗑️ Delete', hd: '#c0392b', bg: '#fdecea', stripe: '#fae0dd' },
};
// Palette for dynamic categories
const DYN_PALETTE = [
  { hd: '#6c3fc9', bg: '#f0ebfd', stripe: '#e8e0fb' },
  { hd: '#0d7377', bg: '#e4f4f4', stripe: '#d6eeee' },
  { hd: '#c2185b', bg: '#fde8f1', stripe: '#fad8e8' },
  { hd: '#5a7a00', bg: '#eef4d6', stripe: '#e4f0c4' },
  { hd: '#7b5800', bg: '#fdf2e0', stripe: '#faecd2' },
  { hd: '#00695c', bg: '#e0f4f1', stripe: '#d0eee9' },
];
const dynColorCache = {};
function getCatColors(catId) {
  if (CORE_CATS[catId]) return CORE_CATS[catId];
  if (!dynColorCache[catId]) {
    // Deterministic pick from palette based on string hash
    let hash = 0;
    for (let i = 0; i < catId.length; i++) hash = (hash * 31 + catId.charCodeAt(i)) & 0xffffffff;
    const palette = DYN_PALETTE[Math.abs(hash) % DYN_PALETTE.length];
    const label = catId.charAt(0).toUpperCase() + catId.slice(1);
    dynColorCache[catId] = { label: '📌 ' + label, hd: palette.hd, bg: palette.bg, stripe: palette.stripe };
  }
  return dynColorCache[catId];
}
function getCatOrder(catId) {
  const fixed = ['do','delegate','decide','delete'];
  const idx = fixed.indexOf(catId);
  return idx >= 0 ? idx : 999;
}
let todos = [];

function loadTodos() {
  try { todos = JSON.parse(localStorage.getItem(TODO_KEY)) || []; }
  catch { todos = []; }
  // Sanitise: remove items with missing text or id, dedupe IDs
  const seen = new Set();
  todos = todos.filter(function(t) {
    if (!t || !t.text || !t.text.trim()) return false;
    if (!t.cat) t.cat = 'do';
    if (seen.has(t.id)) return false;
    seen.add(t.id);
    return true;
  });
}
function saveTodos() {
  localStorage.setItem(TODO_KEY, JSON.stringify(todos));
  updateTodoBadge();
}
function updateTodoBadge() {
  const count = todos.length;
  ['todoBadge','todoBadge2'].forEach(function(id) {
    const el = document.getElementById(id);
    if (!el) return;
    el.textContent = count || '';
    el.classList.toggle('visible', count > 0);
  });
  const countEl = document.getElementById('todoCount');
  if (countEl) countEl.textContent = count > 0 ? count + ' task' + (count !== 1 ? 's' : '') : 'All clear ✓';
}
function escapeHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
function formatDate(iso) {
  if (!iso) return '';
  const d = new Date(iso + 'T00:00:00');
  return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
}
function isOverdue(iso) {
  if (!iso) return false;
  return new Date(iso + 'T00:00:00') < new Date(new Date().toDateString());
}

function renderTodos() {
  const scroll = document.getElementById('todoScroll');
  const empty  = document.getElementById('todoEmpty');
  if (!scroll) return;
  scroll.querySelectorAll('.todo-category').forEach(function(el) { el.remove(); });
  if (todos.length === 0) { empty.style.display = 'flex'; updateTodoBadge(); return; }
  empty.style.display = 'none';
  // Discover all unique categories in current todos, sorted fixed-first then alpha
  const catIds = [];
  todos.forEach(function(t) { if (catIds.indexOf(t.cat) === -1) catIds.push(t.cat); });
  catIds.sort(function(a, b) { return getCatOrder(a) - getCatOrder(b) || a.localeCompare(b); });
  catIds.forEach(function(catId) {
    const col = getCatColors(catId);
    const items = todos.filter(function(t) { return t.cat === catId; });
    if (items.length === 0) return;
    const section = document.createElement('div');
    section.className = 'todo-category';
    section.style.setProperty('--cat-hd', col.hd);
    section.style.setProperty('--cat-bg', col.bg);
    section.style.setProperty('--cat-stripe', col.stripe);
    const hdr = document.createElement('div');
    hdr.className = 'todo-cat-header';
    hdr.innerHTML = '<span>' + col.label + '</span><span class="cat-count">' + items.length + ' task' + (items.length !== 1 ? 's' : '') + '</span>';
    section.appendChild(hdr);
    items.forEach(function(t, idx) {
      const row = document.createElement('div');
      row.className = 'todo-row' + (idx % 2 === 1 ? ' alt' : '');
      row.id = 'todo-' + t.id;
      const overdueCls = isOverdue(t.date) ? ' overdue' : '';
      const dateHtml = t.date ? '<span class="todo-row-date' + overdueCls + '">' + formatDate(t.date) + '</span>' : '';
      const meetHtml = t.meeting ? '<span class="todo-row-meeting">🗓️ ' + escapeHtml(t.meeting) + '</span>' : '';
      const metaHtml = (dateHtml || meetHtml) ? '<div class="todo-row-meta">' + meetHtml + dateHtml + '</div>' : '';
      row.innerHTML = '<div class="todo-row-check"></div>'
        + '<div class="todo-row-body"><div class="todo-row-text">' + escapeHtml(t.text) + '</div>' + metaHtml + '</div>';
      row.querySelector('.todo-row-check').addEventListener('click', function(e) { e.stopPropagation(); completeTodo(t.id); });
      section.appendChild(row);
    });
    scroll.appendChild(section);
  });
  updateTodoBadge();
}

function addTodo(text, meeting) {
  todos.push({ id: Date.now() * 1000 + todos.length, text: text, meeting: meeting || '', cat: 'do', date: '' });
  saveTodos();
  if (document.getElementById('todoScreen').classList.contains('active')) renderTodos();
}

function moveTodo(id, newCat) {
  const t = todos.find(function(t) { return t.id === id; });
  if (t) { t.cat = newCat; saveTodos(); renderTodos(); }
}

async function completeTodo(id) {
  const todo = todos.find(function(t) { return t.id === id; });
  if (!todo) return;
  const cfg = loadCfg();
  if (!cfg.webhook) { toast('No webhook configured', 'error'); return; }
  // Animate
  const el = document.getElementById('todo-' + id);
  if (el) el.style.opacity = '0.4';
  const msg = '✅ Done: ' + todo.text + (todo.meeting ? '\n🗓️ ' + todo.meeting : '');
  let ok = false;
  try {
    const res = await fetch(cfg.webhook, { method: 'POST', body: JSON.stringify({ message: msg }) });
    ok = res.ok;
  } catch(e) { ok = false; }
  if (!ok) {
    if (el) el.style.opacity = '';
    toast('Send failed — task kept', 'error');
    return;
  }
  // Slack confirmed — now remove
  if (el) { el.classList.add('completing'); await new Promise(function(r) { setTimeout(r, 260); }); }
  todos = todos.filter(function(t) { return t.id !== id; });
  saveTodos();
  renderTodos();
  toast('Done & sent to Slack ✓', 'success');
}

function switchTab(tab) {
  const isNotes = tab === 'notes';
  document.getElementById('mainScreen').classList.toggle('active', isNotes);
  document.getElementById('todoScreen').classList.toggle('active', !isNotes);
  ['tabNotes','tabNotes2'].forEach(function(id) { const el=document.getElementById(id); if(el) el.classList.toggle('active', isNotes); });
  ['tabTodo','tabTodo2'].forEach(function(id) { const el=document.getElementById(id); if(el) el.classList.toggle('active', !isNotes); });
  if (!isNotes) renderTodos();
}
