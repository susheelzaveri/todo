<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Slack Notes</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Lato:wght@300;400;700&family=Courier+Prime:wght@400;700&display=swap');

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #f5f2eb;
  --card: #fdfaf4;
  --ink: #1a1a18;
  --ink-light: #6b6860;
  --ink-faint: #c8c4ba;
  --accent: #c0392b;
  --accent-light: rgba(192,57,43,0.08);
  --border: #ddd9cf;
  --radius: 12px;
  --shadow: 0 2px 16px rgba(0,0,0,0.07);
  --green: #1a7a4a;
  --green-light: rgba(26,122,74,0.09);
}

html, body {
  height: 100%;
  background: var(--bg);
  color: var(--ink);
  font-family: 'Lato', sans-serif;
  overscroll-behavior: none;
  -webkit-tap-highlight-color: transparent;
}

body {
  display: flex;
  flex-direction: column;
  min-height: 100dvh;
}

.screen { display: none; flex-direction: column; flex: 1; }
.screen.active { display: flex; }

/* ─── SETUP ─── */
#setupScreen {
  padding-top: max(env(safe-area-inset-top), 20px);
  padding-bottom: max(env(safe-area-inset-bottom), 24px);
}
.setup-inner {
  flex: 1;
  display: flex;
  flex-direction: column;
  padding: 28px 24px 32px;
  gap: 24px;
  overflow-y: auto;
}
.wordmark {
  font-family: 'Courier Prime', monospace;
  font-size: 14px;
  font-weight: 700;
  letter-spacing: 0.08em;
  color: var(--accent);
  text-transform: uppercase;
  display: flex;
  align-items: center;
  gap: 8px;
}
.wordmark::before {
  content: '';
  display: block;
  width: 8px; height: 8px;
  background: var(--accent);
  border-radius: 50%;
}
.setup-title { font-size: 26px; font-weight: 300; line-height: 1.3; }
.setup-title strong { font-weight: 700; }

.field { display: flex; flex-direction: column; gap: 8px; }
.field-label {
  font-family: 'Courier Prime', monospace;
  font-size: 11px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--ink-light);
}
.field-input {
  background: var(--card);
  border: 1.5px solid var(--border);
  border-radius: var(--radius);
  padding: 15px 16px;
  font-family: 'Courier Prime', monospace;
  font-size: 14px;
  color: var(--ink);
  width: 100%;
  outline: none;
  transition: border-color 0.2s;
  -webkit-appearance: none;
  box-shadow: var(--shadow);
}
.field-input:focus { border-color: var(--accent); }
.field-input::placeholder { color: var(--ink-faint); }
.field-hint { font-size: 12px; color: var(--ink-light); line-height: 1.55; }
.field-hint a { color: var(--accent); text-decoration: none; }

.btn-primary {
  background: var(--accent);
  color: #fff;
  border: none;
  border-radius: var(--radius);
  padding: 17px;
  font-family: 'Lato', sans-serif;
  font-size: 16px;
  font-weight: 700;
  width: 100%;
  cursor: pointer;
  transition: opacity 0.15s, transform 0.1s;
  margin-top: auto;
}
.btn-primary:active { opacity: 0.82; transform: scale(0.98); }
.btn-secondary {
  background: none;
  border: 1.5px solid var(--border);
  border-radius: var(--radius);
  padding: 17px;
  font-family: 'Lato', sans-serif;
  font-size: 15px;
  color: var(--ink-light);
  width: 100%;
  cursor: pointer;
}
.btn-secondary:active { opacity: 0.7; }

/* ─── MAIN ─── */
#mainScreen {
  padding-top: max(env(safe-area-inset-top), 0px);
  padding-bottom: max(env(safe-area-inset-bottom), 0px);
}

/* topbar */
.topbar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 14px 20px 12px;
  border-bottom: 1.5px solid var(--border);
  background: var(--card);
  gap: 10px;
}
.channel-pill {
  display: flex;
  align-items: center;
  gap: 6px;
  background: var(--accent-light);
  border: 1px solid rgba(192,57,43,0.2);
  border-radius: 999px;
  padding: 7px 14px;
  flex: 1;
  min-width: 0;
}
.channel-hash { color: var(--accent); font-weight: 700; font-size: 15px; flex-shrink: 0; }
.channel-name {
  font-family: 'Courier Prime', monospace;
  font-size: 13px;
  font-weight: 700;
  color: var(--accent);
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
.topbar-btn {
  background: none;
  border: 1.5px solid var(--border);
  border-radius: 10px;
  width: 38px; height: 38px;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer;
  font-size: 17px;
  color: var(--ink-light);
  flex-shrink: 0;
  transition: all 0.15s;
}
.topbar-btn:active { border-color: var(--accent); color: var(--accent); }

/* main scroll */
.main-scroll {
  flex: 1;
  overflow-y: auto;
  padding: 16px 20px;
  display: flex;
  flex-direction: column;
  gap: 14px;
}

.section-label {
  font-family: 'Courier Prime', monospace;
  font-size: 10px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--ink-faint);
  margin-bottom: -6px;
}

/* ── Native-style meeting select ── */
.meeting-select-wrap {
  position: relative;
}
.meeting-select {
  width: 100%;
  background: var(--card);
  border: 1.5px solid var(--border);
  border-radius: var(--radius);
  padding: 14px 44px 14px 16px;
  font-family: 'Lato', sans-serif;
  font-size: 15px;
  font-weight: 700;
  color: var(--ink);
  appearance: none;
  -webkit-appearance: none;
  outline: none;
  box-shadow: var(--shadow);
  cursor: pointer;
  transition: border-color 0.2s;
  line-height: 1.4;
}
.meeting-select:focus { border-color: var(--accent); }
.meeting-select option { font-weight: 400; }
.meeting-select-arrow {
  position: absolute;
  right: 14px;
  top: 50%;
  transform: translateY(-50%);
  pointer-events: none;
  color: var(--ink-light);
  font-size: 12px;
}
.meeting-select.has-value { border-color: var(--green); color: var(--green); }
.meeting-select.has-value + .meeting-select-arrow { color: var(--green); }
.meeting-select.no-meetings { color: var(--ink-faint); font-weight: 400; font-style: italic; }

/* note textarea */
.note-textarea {
  background: var(--card);
  border: 1.5px solid var(--border);
  border-radius: var(--radius);
  padding: 16px 18px;
  font-family: 'Lato', sans-serif;
  font-size: 17px;
  line-height: 1.6;
  color: var(--ink);
  resize: none;
  outline: none;
  width: 100%;
  height: 160px;
  transition: border-color 0.2s;
  -webkit-appearance: none;
  box-shadow: var(--shadow);
}
.note-textarea:focus { border-color: var(--accent); }
.note-textarea::placeholder { color: var(--ink-faint); }

/* ── Action icons ── */
.action-types {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 8px;
}
.action-type {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 5px;
  background: var(--card);
  border: 1.5px solid var(--border);
  border-radius: var(--radius);
  padding: 12px 6px;
  cursor: pointer;
  transition: all 0.15s;
  box-shadow: var(--shadow);
  -webkit-tap-highlight-color: transparent;
}
.action-type:active { transform: scale(0.94); }
.action-type.selected {
  border-color: var(--accent);
  background: var(--accent-light);
  box-shadow: 0 0 0 3px rgba(192,57,43,0.1);
}
.action-emoji { font-size: 24px; line-height: 1; }
.action-label {
  font-family: 'Courier Prime', monospace;
  font-size: 10px;
  letter-spacing: 0.04em;
  text-transform: uppercase;
  color: var(--ink-light);
  text-align: center;
}
.action-type.selected .action-label { color: var(--accent); font-weight: 700; }

/* send bar */
.send-bar {
  display: flex;
  gap: 10px;
  padding: 14px 20px calc(env(safe-area-inset-bottom, 0px) + 16px);
  border-top: 1.5px solid var(--border);
  background: var(--card);
}
.btn-clear {
  background: none;
  border: 1.5px solid var(--border);
  border-radius: var(--radius);
  padding: 0 16px;
  color: var(--ink-light);
  font-size: 18px;
  cursor: pointer;
  height: 54px;
  min-width: 54px;
}
.btn-clear:active { border-color: var(--accent); color: var(--accent); }
.btn-send {
  flex: 1;
  background: var(--accent);
  color: #fff;
  border: none;
  border-radius: var(--radius);
  height: 54px;
  font-family: 'Lato', sans-serif;
  font-size: 16px;
  font-weight: 700;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  transition: opacity 0.15s, transform 0.1s;
}
.btn-send:active { opacity: 0.82; transform: scale(0.98); }
.btn-send:disabled { opacity: 0.35; }
.spinner {
  width: 18px; height: 18px;
  border: 2px solid rgba(255,255,255,0.3);
  border-top-color: #fff;
  border-radius: 50%;
  animation: spin 0.7s linear infinite;
  display: none;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* toast */
#toast {
  position: fixed;
  bottom: calc(env(safe-area-inset-bottom, 0px) + 80px);
  left: 50%; transform: translateX(-50%) translateY(14px);
  background: var(--ink);
  color: #fff;
  border-radius: 999px;
  padding: 12px 22px;
  font-size: 14px;
  font-weight: 500;
  white-space: nowrap;
  opacity: 0;
  transition: opacity 0.22s, transform 0.22s;
  pointer-events: none;
  z-index: 200;
  box-shadow: 0 4px 20px rgba(0,0,0,0.25);
}
#toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
#toast.success { background: var(--green); }
#toast.error { background: var(--accent); }
</style>
</head>
<body>

<!-- SETUP SCREEN -->
<div id="setupScreen" class="screen">
  <div class="setup-inner">
    <div class="wordmark">Slack Notes</div>
    <div class="setup-title" id="setupTitle">Quick notes,<br><strong>straight to Slack.</strong></div>

    <div class="field">
      <div class="field-label">Slack Webhook URL</div>
      <input class="field-input" type="url" id="webhookInput"
        placeholder="https://hooks.slack.com/services/..."
        autocomplete="off" autocorrect="off" spellcheck="false">
      <p class="field-hint">
        <a href="https://api.slack.com/apps" target="_blank">api.slack.com/apps</a>
        → Your App → Incoming Webhooks → Add New Webhook
      </p>
    </div>

    <div class="field">
      <div class="field-label">Channel name</div>
      <input class="field-input" type="text" id="channelInput"
        placeholder="#general" autocomplete="off" autocorrect="off">
    </div>

    <button class="btn-primary" onclick="saveSetup()">Save & Open →</button>
    <button class="btn-secondary" id="backBtn" onclick="goBack()" style="display:none">← Back</button>
  </div>
</div>

<!-- MAIN SCREEN -->
<div id="mainScreen" class="screen">

  <div class="topbar">
    <div class="channel-pill">
      <span class="channel-hash">#</span>
      <span class="channel-name" id="channelDisplay">channel</span>
    </div>
    <button class="topbar-btn" onclick="pasteMeetings()" title="Paste meetings">📋</button>
    <button class="topbar-btn" onclick="openSettings()" title="Settings">⚙</button>
  </div>

  <div class="main-scroll">

    <!-- Meeting picker -->
    <div class="section-label">Meeting</div>
    <div class="meeting-select-wrap">
      <select class="meeting-select no-meetings" id="meetingSelect" onchange="onMeetingChange()">
        <option value="">No meetings — tap 📋 to paste</option>
      </select>
      <span class="meeting-select-arrow">▼</span>
    </div>

    <!-- Note -->
    <div class="section-label">Note</div>
    <textarea class="note-textarea" id="noteText"
      placeholder="Write your note…"
      maxlength="3000"></textarea>

    <!-- Action icons -->
    <div class="section-label">Type</div>
    <div class="action-types" id="actionTypes"></div>

  </div>

  <div class="send-bar">
    <button class="btn-clear" onclick="clearAll()">✕</button>
    <button class="btn-send" id="sendBtn" onclick="sendNote()">
      <span id="sendLabel">Send to Slack</span>
      <div class="spinner" id="spinner"></div>
    </button>
  </div>

</div>

<div id="toast"></div>

<script>
const ACTION_TYPES = [
  { emoji: '👔', label: 'Manager',  tag: '👔 Manager'  },
  { emoji: '🔄', label: 'Delegate', tag: '🔄 Delegate' },
  { emoji: '✅', label: 'My ToDo',  tag: '✅ My ToDo'  },
  { emoji: '📝', label: 'Notes',    tag: '📝 Notes'    },
  { emoji: '💡', label: 'Ideas',    tag: '💡 Ideas'    },
  { emoji: '👥', label: 'Group',    tag: '👥 Group'    },
];

const STORAGE_KEY = 'slacknotes_v4';
let selectedTypes = new Set();
let meetings = [];

// ── Storage ───────────────────────────────────────
function loadCfg() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || {}; } catch { return {}; }
}
function saveCfg(updates) {
  const cfg = loadCfg();
  localStorage.setItem(STORAGE_KEY, JSON.stringify({ ...cfg, ...updates }));
}

// ── Boot ─────────────────────────────────────────
function init() {
  renderActionTypes();
  const cfg = loadCfg();
  if (cfg.webhook && cfg.channel) {
    showMain(cfg);
    // Restore persisted meetings
    if (cfg.meetings && Array.isArray(cfg.meetings) && cfg.meetings.length > 0) {
      meetings = cfg.meetings;
      populateMeetingSelect(meetings, true); // true = auto-select by time
    }
  } else {
    showScreen('setupScreen');
  }
}

// ── Screens ───────────────────────────────────────
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function showMain(cfg) {
  document.getElementById('channelDisplay').textContent = cfg.channel.replace(/^#/, '');
  showScreen('mainScreen');
}

function openSettings() {
  const cfg = loadCfg();
  document.getElementById('webhookInput').value = cfg.webhook || '';
  document.getElementById('channelInput').value = cfg.channel ? '#' + cfg.channel.replace(/^#/, '') : '';
  document.getElementById('setupTitle').innerHTML = 'Update your<br><strong>settings.</strong>';
  document.getElementById('backBtn').style.display = 'block';
  showScreen('setupScreen');
}

function goBack() {
  const cfg = loadCfg();
  if (cfg.webhook && cfg.channel) showMain(cfg);
}

function saveSetup() {
  const webhook = document.getElementById('webhookInput').value.trim();
  const channel = document.getElementById('channelInput').value.trim().replace(/^#/, '');
  if (!webhook.startsWith('https://hooks.slack.com/')) {
    toast('Enter a valid Slack webhook URL', 'error'); return;
  }
  if (!channel) { toast('Enter a channel name', 'error'); return; }
  saveCfg({ webhook, channel });
  showMain({ webhook, channel });
  toast('Settings saved ✓', 'success');
}

// ── Paste & validate meetings ─────────────────────
async function pasteMeetings() {
  let text = '';
  try {
    text = await navigator.clipboard.readText();
  } catch {
    toast('Clipboard access denied — allow it and try again', 'error');
    return;
  }

  if (!text || !text.trim()) {
    toast('Clipboard is empty — run the Shortcut first', 'error');
    return;
  }

  let data;
  try {
    data = JSON.parse(text.trim());
  } catch {
    toast('Invalid format — must be JSON array', 'error');
    return;
  }

  if (!Array.isArray(data)) {
    toast('Invalid format — expected a list of meetings', 'error');
    return;
  }

  if (data.length === 0) {
    toast('No meetings found in clipboard', 'error');
    return;
  }

  const invalid = data.find(m => typeof m.title === 'undefined');
  if (invalid) {
    toast('Invalid format — each meeting needs a title', 'error');
    return;
  }

  // Valid — save and populate
  meetings = data;
  saveCfg({ meetings });
  populateMeetingSelect(meetings, true);
  toast(data.length + ' meetings loaded ✓', 'success');
}

// ── Meeting select ────────────────────────────────
function populateMeetingSelect(data, autoSelect) {
  const sel = document.getElementById('meetingSelect');
  sel.innerHTML = '';
  sel.classList.remove('no-meetings', 'has-value');

  // Blank option
  const blank = document.createElement('option');
  blank.value = '';
  blank.textContent = '— No meeting —';
  sel.appendChild(blank);

  data.forEach((m, i) => {
    const opt = document.createElement('option');
    opt.value = i;
    opt.textContent = m.time ? m.time + '  ·  ' + m.title : m.title;
    sel.appendChild(opt);
  });

  if (autoSelect && data.length > 0) {
    const idx = smartSelectIndex(data);
    sel.value = idx;
    sel.classList.add('has-value');
  }
}

function smartSelectIndex(data) {
  const now = new Date();
  const nowMins = now.getHours() * 60 + now.getMinutes();

  // Parse each meeting time to minutes
  const parsed = data.map((m, i) => {
    const mins = parseTimeMins(m.time);
    return { i, mins };
  });

  // Find meeting happening now or most recently past
  let best = 0;
  for (let j = 0; j < parsed.length; j++) {
    if (parsed[j].mins <= nowMins) {
      best = j;
    }
  }
  return best;
}

function parseTimeMins(timeStr) {
  if (!timeStr) return 0;
  const match = timeStr.match(/(\d+):(\d+)\s*(AM|PM)?/i);
  if (!match) return 0;
  let h = parseInt(match[1]);
  const m = parseInt(match[2]);
  const period = (match[3] || '').toUpperCase();
  if (period === 'PM' && h !== 12) h += 12;
  if (period === 'AM' && h === 12) h = 0;
  return h * 60 + m;
}

function onMeetingChange() {
  const sel = document.getElementById('meetingSelect');
  sel.classList.toggle('has-value', sel.value !== '');
}

// ── Action types ──────────────────────────────────
function renderActionTypes() {
  const container = document.getElementById('actionTypes');
  container.innerHTML = '';
  ACTION_TYPES.forEach((t, i) => {
    const el = document.createElement('div');
    el.className = 'action-type';
    el.id = 'action-' + i;
    el.innerHTML = `<span class="action-emoji">${t.emoji}</span><span class="action-label">${t.label}</span>`;
    el.onclick = () => toggleType(i);
    container.appendChild(el);
  });
}

function toggleType(i) {
  if (selectedTypes.has(i)) {
    selectedTypes.delete(i);
    document.getElementById('action-' + i).classList.remove('selected');
  } else {
    selectedTypes.add(i);
    document.getElementById('action-' + i).classList.add('selected');
  }
}

// ── Send ──────────────────────────────────────────
async function sendNote() {
  const cfg = loadCfg();
  const text = document.getElementById('noteText').value.trim();
  const sel = document.getElementById('meetingSelect');

  if (selectedTypes.size === 0) { toast('Pick at least one type', 'error'); return; }
  if (!text) { toast('Write your note first', 'error'); return; }

  // Build type prefix — plain text, no markdown
  const typePrefix = Array.from(selectedTypes)
    .sort()
    .map(i => ACTION_TYPES[i].tag)
    .join(' ');

  // Build message
  let message = typePrefix + ' — ' + text;

  // Append meeting if selected
  if (sel.value !== '') {
    const m = meetings[parseInt(sel.value)];
    if (m) {
      message += '\n📅 ' + m.title + (m.time ? ' · ' + m.time : '');
    }
  }

  const btn = document.getElementById('sendBtn');
  const label = document.getElementById('sendLabel');
  const spinner = document.getElementById('spinner');
  btn.disabled = true;
  label.style.display = 'none';
  spinner.style.display = 'block';

  try {
    const res = await fetch(cfg.webhook, {
      method: 'POST',
      body: JSON.stringify({ message: message })
    });
    if (res.ok) {
      toast('Sent to #' + cfg.channel.replace(/^#/, '') + ' ✓', 'success');
      // Clear note and types but keep meeting selection
      document.getElementById('noteText').value = '';
      selectedTypes.clear();
      document.querySelectorAll('.action-type').forEach(el => el.classList.remove('selected'));
    } else {
      throw new Error(res.status);
    }
  } catch {
    toast('Send failed — check webhook', 'error');
  } finally {
    btn.disabled = false;
    label.style.display = 'inline';
    spinner.style.display = 'none';
  }
}

function clearAll() {
  document.getElementById('noteText').value = '';
  selectedTypes.clear();
  document.querySelectorAll('.action-type').forEach(el => el.classList.remove('selected'));
  const sel = document.getElementById('meetingSelect');
  sel.value = '';
  sel.classList.remove('has-value');
}

// ── Toast ─────────────────────────────────────────
let toastTimer;
function toast(msg, type) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'show ' + (type || '');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.className = '', 2800);
}

init();
</script>
</body>
</html>
